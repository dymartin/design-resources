name: Deploy to Pages

# Requires Settings -> Pages -> Source = "GitHub Actions".
# On the "Deploy from a branch" source this workflow runs green but nothing
# reaches the live site, because that source only serves committed files.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Deliberately not cancelling: interrupting a half-finished Pages deploy can
  # leave the live site in a broken state.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      # No dependencies to install — the generator uses Node built-ins only.
      - name: Build site
        run: node tools/build.mjs

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
